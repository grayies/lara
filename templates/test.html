<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfumes | LARA</title>

    <!-- Google Material Symbols -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet"
    />
    <style>
      .coming-soon-wrapper {
        position: relative;
      }

      /* Section behind */
      .coming-soon-content {
        filter: blur(3px); /* makes it unfocused */
        opacity: 0.6; /* slightly faded */
        pointer-events: none; /* disables interaction */
      }

      /* Strip/banner */
      .coming-soon-strip {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 10;

        background: #ff4d4f; /* bright attention color */
        color: #fff;
        text-align: center;
        font-weight: bold;
        padding: 10px 0;
        font-size: 16px;
        letter-spacing: 1px;
        text-transform: uppercase;

        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
    </style>

    <link rel="stylesheet" href="../static/css/master.css" />
    <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.20/bundled/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.3/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.3/ScrollTrigger.min.js"></script>
  </head>
  <body>
    <div class="coming-soon-wrapper">
      <div class="coming-soon-strip">Coming Soon</div>

      <section class="coming-soon-content">
        <!-- Your section content -->
        <h2>Perfume Samples</h2>
        <p>Exclusive scents arriving soon.</p>
      </section>
    </div>

    <script src="../static/js/main.js"></script>
  </body>
</html>
